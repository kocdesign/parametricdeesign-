<!DOCTYPE html>

<html lang='en'>

<head>
    <meta charset="UTF-8" />
    <title>visualparasystem</title>

    <!-- TRY: swap in "Space Grotesk" and "Playfair Display" -->
<link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap' rel='stylesheet'>
    
    <style>
      
        body {
    /* Deep navy for softer trails */
            background: #020b18;
            overflow: hidden;
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
        
        }

        #controls button {
            margin-right: 6px;

            cursor: pointer;
        }

        /* ORIGINAL — title is faint (0.25 opacity) */
#title-block h1 {
    color: rgba(255,255,255,0.25);

}

        /* Frequency bar colors (warm amber palette) */
        .freq-fill {
            position: fixed;
            bottom: 0;
            width: 20%;
            height: 6px;
        }

        #bar-bass     { left: 0%;  background: #ff4500; }
        #bar-lowmid   { left: 20%; background: #ff8c00; }
        #bar-mid      { left: 40%; background: #ffd700; }
        #bar-highmid  { left: 60%; background: #ffe066; }
        #bar-treble   { left: 80%; background: #fff8dc; }
    </style>
</head>

<body>

            
<!-- UI Controls -->
    <div id="controls">
        <!-- Inside <div id="controls"> -->
        <button class="mode-btn" data-mode="5">Radial Wave</button>
        <button id="start-btn">Activate Mic</button>
    </div>
        

<!-- TRY: a warm amber palette / red-orange, dark orange, gold, light gold, cream-->
    <div class="freq-fill" id="bar-bass"></div>
    <div class="freq-fill" id="bar-lowmid"></div>
    <div class="freq-fill" id="bar-mid"></div>
    <div class="freq-fill" id="bar-highmid"></div>
    <div class="freq-fill" id="bar-treble"></div>
    
    <script>
        /*

*/
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        
        let W = window.innerWidth;
        let H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
        
        window.onresize = () => {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        
        };

let audioCtx, analyser, freqData, timeData;
let sBass = 0, sLowMid = 0, sMid = 0, sHighMid = 0, sTreble = 0;
let sRMS = 0, sHue = 30;

/* Frequency band helper */
function bandEnergy(arr, sr, low, high) {
    const iLow = Math.floor((low / sr) * arr.length);
    const iHigh = Math.floor((high / sr) * arr.length);
    let sum = 0;
    for (let i = iLow; i <= iHigh; i++) sum += arr[i];
    return sum / (iHigh - iLow + 1);
}

/* HSL helper */
function hsl(h, s, l, a = 1) {
    return `hsla(${h},${s}%,${l}%,${a})`;
}

/* 

*/
document.getElementById("start-btn").onclick = async () => {
    audioCtx = new AudioContext();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const src = audioCtx.createMediaStreamSource(stream);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;   /* lower resolution = chunkier, reactive feel */
    analyser.smoothingTimeConstant = 0.4; /* immediate / reactive (good for percussion) */

    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);

    src.connect(analyser);

    animate();
};

/* 


/* TRY: more reactive overall, with bass emphasized */
const sm = 0.2;
sBass = sBass * (1 - sm) + bass * sm * 6; // ×6 = bass hits harder

function drawLissajous(x0, y0) {
    ctx.save();
    ctx.globalAlpha = 0.8;

    const LISS_HISTORY = 200;  /* TRY: a short, sharp tail */
    const t = performance.now() * 0.001;

    const freqRatioA = 4 + sBass * 4;
    const freqRatioB = 5 + sHighMid * 3;
    const phaseShift = t * 0.2 + sMid * Math.PI * 2;

    ctx.beginPath();
    for (let i = 0; i < LISS_HISTORY; i++) {
        const tt = t - i * 0.01;
        const x = x0 + Math.sin(tt * freqRatioA + phaseShift) * W * 0.25;
        const y = y0 + Math.sin(tt * freqRatioB) * H * 0.25;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }

    ctx.strokeStyle = hsl(sHue, 80, 60, 0.7);
    ctx.lineWidth = 1.5 + sRMS * 3;
    ctx.stroke();
    ctx.restore();
}

drawLissajous()
      
      const freqRatioA = 4 + sBass    * 4;
      const freqRatioB = 5 + sHighMid * 3;
      const phaseShift = t * 0.2 + sMid * Math.PI * 2;

  /* TRY: a short, sharp tail */
      const LISS_HISTORY = 200;

  /* TRY: very slow fade (ghostly, accumulating image) */
      ctx.fillStyle = rgba(0,0,0,0.04);

function drawMandala(cx, cy) {
    ctx.save();
    const t = performance.now() * 0.001;

    const petals = Math.round(3 + sBass * 8); /* TRY: fewer petals, driven by bass instead */
    const rotSpeed = -(sTreble * 0.06 + 0.002); /* TRY: reverse spin, driven by treble */

    ctx.translate(cx, cy);
    ctx.rotate(t * rotSpeed);

    for (let p = 0; p < petals; p++) {
        ctx.rotate((Math.PI * 2) / petals);

        const ringR = Math.min(W, H) * 0.25;
        const bandVal = sMid;

        /* TRY: longer, thinner petals */
        const petalLen = ringR * (0.9 + bandVal * 1.2);
        const petalW = ringR * (0.1 + sMid * 0.15);

        ctx.beginPath();
        ctx.ellipse(0, -ringR, petalW, petalLen, 0, 0, Math.PI * 2);
        ctx.strokeStyle = hsl(sHue, 100, 75, 0.7);
        ctx.lineWidth = 1 + sRMS * 4;
        ctx.stroke();
    }

    ctx.restore();
}

function drawConstellation(cx, cy) {
    /* TRY: 400 small, fast particles — dense nebula feel */
    const count = 400;
    if (!window.particles) {
        window.particles = [];
        for (let i = 0; i < count; i++) {
            window.particles.push(newParticle());
        }
    }

    const connectDist = 150;

    for (let p of window.particles) {
        p.angle += p.orbitSpeed;
        p.x = cx + Math.cos(p.angle) * p.orbitR + p.vx;
        p.y = cy + Math.sin(p.angle) * p.orbitR + p.vy;

        p.vx *= 0.98;
        p.vy *= 0.98;

        ctx.beginPath();
        ctx.fillStyle = hsl(sHue, 90, 80, 0.8);
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }

    for (let a of window.particles) {
        for (let b of window.particles) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const d = Math.hypot(dx, dy);
            if (d < connectDist) {
                ctx.strokeStyle = hsl(sHue, 80, 65, 0.05);
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
            }
        }
    }
}
function newParticle() {
    /* Inside newParticle(): */
    return {
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        orbitR: Math.random() * Math.min(W,H) * 0.38 + 20,
        orbitSpeed: (Math.random() - 0.5) * 0.004,
        angle: Math.random() * Math.PI * 2,
        size: Math.random() * 2.5 + 0.5
    };
}

function drawInterference(cx, cy) {
     /* TRY: chunky pixel art look */
    const res = 8;
     /* TRY: very slow, large wave — almost a solid gradient */
    const waveFreq = 1 + sBass;
    const distortion = sMid * 0.1;

    const maxR = Math.min(W, H) * 0.4;
    const t = performance.now() * 0.001;

    /* TRY: sources orbit each other in a circle */
    const s1x = cx + Math.cos(t * 0.4) * maxR * 0.3;
    const s1y = cy + Math.sin(t * 0.4) * maxR * 0.3;
    const s2x = cx - Math.cos(t * 0.4) * maxR * 0.3;
    const s2y = cy - Math.sin(t * 0.4) * maxR * 0.3;

    for (let y = 0; y < H; y += res) {
        for (let x = 0; x < W; x += res) {
            const d1 = Math.hypot(x - s1x, y - s1y);
            const d2 = Math.hypot(x - s2x, y - s2y);
            const v = Math.sin(d1 * waveFreq * 0.01 + distortion) +
                      Math.sin(d2 * waveFreq * 0.01 - distortion);

            const hue = (sHue + v * 20) % 360;
            ctx.fillStyle = hsl(hue, 90, 55);
            ctx.fillRect(x, y, res, res);
        }
    }
}

/* 

*/
        /* 5. RADIAL WAVE — draws a circle whose radius pulses with the waveform */
function drawRadialWave(x0, y0, w, h, alpha = 1) {
    if (!timeData) return;

    const baseR = Math.min(w, h) * 0.3;
    const segments = 256; // how many points around the circle

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();

    for (let i = 0; i <= segments; i++) {
        // Sample the time-domain waveform at this angle's position
        const angle = (i / segments) * Math.PI * 2;
        const idx = Math.floor((i / segments) * timeData.length);
        const sample = (timeData[idx] - 128) / 128;

        const r = baseR + sample * baseR * 0.5 * (1 + sRMS * 3);
        const px = x0 + Math.cos(angle) * r;
        const py = y0 + Math.sin(angle) * r;

        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.closePath();

    ctx.strokeStyle = hsl(sHue, 90, 65, 0.7);
    ctx.lineWidth = 2 + sRMS * 4;
    ctx.shadowBlur = 15 + sRMS * 30;
    ctx.shadowColor = hsl(sHue, 100, 70);

    ctx.stroke();
    ctx.restore();
}

/* 

*/

let mode = 0;
const MODE_NAMES = [
  'LISSAJOUS',
  'MANDALA',
  'CONSTELLATION',
  'INTERFERENCE',
  'ALL MODES',
  'RADIAL WAVE' //add this
];

document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.onclick = () => {
        mode = Number(btn.dataset.mode);
    };
});

function animate() {
    requestAnimationFrame(animate);

    if (!analyser) return;

    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);

    const sr = audioCtx.sampleRate;

    const bass    = bandEnergy(freqData, sr, 20,   200);
    const lowmid  = bandEnergy(freqData, sr, 200,  600);
    const mid     = bandEnergy(freqData, sr, 600,  2000);
    const highmid = bandEnergy(freqData, sr, 2000, 5000);
    const treble  = bandEnergy(freqData, sr, 5000, 12000);

    const sm = 0.2;
    sBass    = sBass    * (1-sm) + bass    * sm * 6;
    sLowMid  = sLowMid  * (1-sm) + lowmid  * sm;
    sMid     = sMid     * (1-sm) + mid     * sm;
    sHighMid = sHighMid * (1-sm) + highmid * sm;
    sTreble  = sTreble  * (1-sm) + treble  * sm;

    let rms = 0;
    for (let i = 0; i < timeData.length; i++) {
        const v = (timeData[i] - 128) / 128;
        rms += v * v;
    }
    sRMS = Math.sqrt(rms / timeData.length);

    const sPeakFreq = (bass * 0.6 + mid * 0.4);
    sHue = (sPeakFreq / 800) * 60;

    ctx.fillStyle = "rgba(0,0,0,0.04)";
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2;
    const cy = H / 2;

    if (mode === 0) drawLissajous(cx, cy);
    else if (mode === 1) drawMandala(cx, cy);
    else if (mode === 2) drawConstellation(cx, cy);
    else if (mode === 3) drawInterference(cx, cy);
    else if (mode === 4) {
        drawLissajous(cx, cy);
        drawMandala(cx, cy);
        drawConstellation(cx, cy);
        drawInterference(cx, cy);
    }
         /* Add this after the mode === 3 branch */
    else if (mode === 5) drawRadialWave(cx, cy, W, H);
}
</script>
